function useCollection(name) {
  const [data, setData] = useState([]);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    const unsub = fdb.collection(name).onSnapshot(snap => {
      setData(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setReady(true);
    }, err => { console.error("Firestore (" + name + "):", err); setReady(true); });
    return unsub;
  }, []);
  return [data, ready];
}
const setItem = (name, id, data) => fdb.collection(name).doc(id).set(data, { merge: true });
const updateItem = (name, id, data) => fdb.collection(name).doc(id).update(data);
const removeItem = (name, id) => fdb.collection(name).doc(id).delete();

const genId = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
function downscaleImage(file, maxDim, quality) {
  maxDim = maxDim || 1000; quality = quality || 0.55;
  return new Promise(function (resolve, reject) {
    if (!file || !/^image\//.test(file.type)) { reject(new Error("Selecione uma imagem (JPG ou PNG).")); return; }
    var reader = new FileReader();
    reader.onload = function () {
      var img = new Image();
      img.onload = function () {
        var w = img.width, hh = img.height;
        if (w >= hh) { if (w > maxDim) { hh = Math.round(hh * maxDim / w); w = maxDim; } }
        else { if (hh > maxDim) { w = Math.round(w * maxDim / hh); hh = maxDim; } }
        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = hh;
        canvas.getContext("2d").drawImage(img, 0, 0, w, hh);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = function () { reject(new Error("Imagem inválida.")); };
      img.src = reader.result;
    };
    reader.onerror = function () { reject(new Error("Falha ao ler o arquivo.")); };
    reader.readAsDataURL(file);
  });
}
function getLocation(timeout) {
  timeout = timeout || 8000;
  return new Promise(function (resolve) {
    if (!navigator.geolocation) { resolve(null); return; }
    var done = false;
    function finish(loc) { if (!done) { done = true; resolve(loc); } }
    var t = setTimeout(function () { finish(null); }, timeout);
    navigator.geolocation.getCurrentPosition(
      function (pos) { clearTimeout(t); finish({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
      function () {
        navigator.geolocation.getCurrentPosition(
          function (pos) { clearTimeout(t); finish({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
          function () { clearTimeout(t); finish(null); },
          { enableHighAccuracy: false, timeout: timeout, maximumAge: 60000 }
        );
      },
      { enableHighAccuracy: true, timeout: Math.floor(timeout / 2), maximumAge: 10000 }
    );
  });
}
function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function parseHM(s) { const p = (s || "08:00").split(":"); return (parseInt(p[0], 10) || 0) * 60 + (parseInt(p[1], 10) || 0); }
function minutesOfDay(iso) { const d = new Date(iso); return d.getHours() * 60 + d.getMinutes(); }
function minutesBetween(isoA, isoB) { return Math.round((new Date(isoB) - new Date(isoA)) / 60000); }
function minutesToHM(m) { m = Math.max(0, Math.round(m)); const hh = Math.floor(m / 60), mm = m % 60; return hh + "h" + (mm ? " " + mm + "min" : ""); }
const fmt = {
  timeOnly: (iso) => iso ? new Date(iso).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }) : "—",
  dateBR: (s) => { if (!s) return "—"; const p = s.split("-"); return p[2] + "/" + p[1] + "/" + p[0]; },
  dateTimeBR: (iso) => iso ? new Date(iso).toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" }) : "—"
};
function getNextPunchType(rec) {
  if (!rec || !rec.in) return "in";
  if (!rec.lunchOut) return "lunchOut";
  if (!rec.lunchIn) return "lunchIn";
  if (!rec.out) return "out";
  return null;
}
const PUNCH_LABEL = { in: "Entrada", lunchOut: "Saída Almoço", lunchIn: "Volta Almoço", out: "Saída" };

async function registerPunch(user, type, photo, loc) {
  const dateStr = todayKey();
  const id = user.id + "_" + dateStr;
  const now = new Date().toISOString();
  const punchData = { time: now, lat: loc ? loc.lat : null, lng: loc ? loc.lng : null, selfie: photo || null };
  const snap = await getDoc("records", id);
  let data = snap.exists ? snap.data() : { userId: user.id, userName: user.name, date: dateStr };
  data[type] = punchData;
  if (type === "in") {
    const sched = parseHM(user.scheduleStart);
    const actual = minutesOfDay(now);
    const lateMinutes = Math.max(0, actual - sched);
    data.lateMinutes = lateMinutes;
    data.warning = lateMinutes > (user.toleranceMinutes != null ? user.toleranceMinutes : 15);
    data.warningAck = false;
  }
  if (type === "out" && data.in && data.lunchOut && data.lunchIn) {
    const worked = minutesBetween(data.in.time, data.lunchOut.time) + minutesBetween(data.lunchIn.time, data.out.time);
    const expected = (parseHM(user.scheduleEnd) - parseHM(user.scheduleStart)) - (user.lunchMinutes != null ? user.lunchMinutes : 60);
    data.workedMinutes = worked;
    data.expectedMinutes = expected;
    data.overtimeMinutes = Math.max(0, worked - expected);
  }
  await setItem("records", id, data);
  return data;
}

function exportCSV(records, employees) {
  employees = employees || [];
  const empById = {};
  employees.forEach(e => { empById[e.id] = e; });
  const esc = (v) => '"' + String(v == null ? "" : v).replace(/"/g, '""') + '"';
  // agrupar registros por colaborador
  const groups = {};
  records.forEach(r => {
    const key = r.userId || r.userName || "—";
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  const keys = Object.keys(groups).sort((a, b) => {
    const na = (empById[a] && empById[a].name) || (groups[a][0] && groups[a][0].userName) || "";
    const nb = (empById[b] && empById[b].name) || (groups[b][0] && groups[b][0].userName) || "";
    return na.localeCompare(nb);
  });
  const lines = [];
  keys.forEach(key => {
    const recs = groups[key].slice().sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    const emp = empById[key];
    const nome = (emp && emp.name) || (recs[0] && recs[0].userName) || "—";
    const posto = (emp && emp.posto) ? emp.posto : "—";
    lines.push(esc("Colaborador: " + nome));
    lines.push(esc("Posto: " + posto));
    lines.push("");
    lines.push(["Dia", "Entrada", "Saída Almoço", "Retorno Almoço", "Saída", "Horas Extras"].map(esc).join(","));
    recs.forEach(r => {
      lines.push([
        fmt.dateBR(r.date),
        r.in ? fmt.timeOnly(r.in.time) : "—",
        r.lunchOut ? fmt.timeOnly(r.lunchOut.time) : "—",
        r.lunchIn ? fmt.timeOnly(r.lunchIn.time) : "—",
        r.out ? fmt.timeOnly(r.out.time) : "—",
        r.overtimeMinutes ? minutesToHM(r.overtimeMinutes) : "—"
      ].map(esc).join(","));
    });
    lines.push(""); lines.push("");
  });
  const csv = lines.join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "relatorio_ponto_" + todayKey() + ".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// CÂMERA DE SELFIE
// ═══════════════════════════════════════════════════════════
function SelfieCam({ onCapture, onCancel, facingMode, captureWidth }) {
  facingMode = facingMode || "user";
  captureWidth = captureWidth || 240;
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const canvasRef = useRef(null);
  const [photo, setPhoto] = useState(null);
  const [err, setErr] = useState("");
  const [starting, setStarting] = useState(true);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode, width: { ideal: facingMode === "user" ? 480 : 1280 } } });
        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
        setStarting(false);
      } catch (e) { setErr("Câmera indisponível (" + (e.message || "erro") + ")"); setStarting(false); }
    })();
    return () => { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
  }, []);

  const capture = () => {
    const v = videoRef.current; if (!v || !v.videoWidth) return;
    const w = captureWidth, hh = Math.round(w * (v.videoHeight / v.videoWidth));
    const canvas = canvasRef.current;
    canvas.width = w; canvas.height = hh;
    canvas.getContext("2d").drawImage(v, 0, 0, w, hh);
    setPhoto(canvas.toDataURL("image/jpeg", 0.6));
  };

  const confirm = () => { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); onCapture(photo); };

  return h("div", { style: { position: "fixed", inset: 0, background: "#000", zIndex: 200, display: "flex", flexDirection: "column" } },
    h("div", { style: { flex: 1, position: "relative", display: "flex", alignItems: "center", justifyContent: "center" } },
      !photo && h("video", { ref: videoRef, autoPlay: true, playsInline: true, muted: true, style: { width: "100%", height: "100%", objectFit: "cover", display: starting ? "none" : "block" } }),
      photo && h("img", { src: photo, style: { width: "100%", height: "100%", objectFit: "cover" } }),
      starting && !err && h("div", { style: { color: "#fff", textAlign: "center" } }, "Abrindo câmera..."),
      err && h("div", { style: { color: "#fca5a5", textAlign: "center", padding: 20 } }, err)
    ),
    h("canvas", { ref: canvasRef, style: { display: "none" } }),
    h("div", { style: { padding: 16, display: "flex", gap: 12, justifyContent: "center", background: "#000", flexWrap: "wrap" } },
      h(Btn, { onClick: onCancel, color: "#1e293b" }, "Cancelar"),
      err && h(Btn, { onClick: () => onCapture(null), color: "#475569" }, "Continuar sem foto"),
      !photo && !err && h(Btn, { onClick: capture, disabled: starting }, "📸 Capturar"),
      photo && h(Btn, { onClick: () => setPhoto(null), color: "#475569" }, "Repetir"),
      photo && h(Btn, { onClick: confirm, color: "#00d68f", style: { color: "#04150d" } }, "Confirmar")
    )
  );
}

  return h("div", { style: { padding: 16 } },
    viewer && h(ImageViewer, { src: viewer, onClose: () => setViewer(null) }),
    h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 20, marginBottom: 16 } }, "Justificativas"),
    justifications.length === 0 ? h(Card, { style: { padding: 40, textAlign: "center" } }, h("div", { style: { color: C.muted } }, "Nenhuma justificativa")) :
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
        justifications.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || "")).map(j => h(Card, { key: j.id, style: { padding: 14 } },
          h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
            h("div", null,
              h("div", { style: { color: "#fff", fontWeight: 700, fontSize: 14 } }, j.userName),
              h("div", { style: { color: C.muted, fontSize: 11, marginTop: 2 } }, fmt.dateBR(j.date) + " • " + (j.type || ""))
            ),
            h("span", { style: { background: (STJ[j.status] || STJ.pending).c + "22", color: (STJ[j.status] || STJ.pending).c, fontSize: 10, padding: "3px 8px", borderRadius: 20, fontWeight: 700 } }, (STJ[j.status] || STJ.pending).l)
          ),
          h("div", { style: { color: "#cbd5e1", fontSize: 13, marginTop: 8 } }, j.reason),
          j.attachment && h("div", { style: { marginTop: 10 } },
            h("div", { style: { color: C.muted, fontSize: 10, letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 } }, "Anexo"),
            h("img", { src: j.attachment, onClick: () => setViewer(j.attachment), style: { width: 90, height: 90, borderRadius: 8, objectFit: "cover", cursor: "pointer", border: "1px solid " + C.border } })
          ),
          j.status === "pending" && h("div", { style: { display: "flex", gap: 8, marginTop: 10 } },
            h(Btn, { onClick: () => respond(j, "rejected"), color: "#7f1d1d", style: { flex: 1, padding: "8px", fontSize: 12 } }, "Rejeitar"),
            h(Btn, { onClick: () => respond(j, "approved"), color: "#166534", style: { flex: 1, padding: "8px", fontSize: 12 } }, "Aprovar")
          )
        ))
      )
  );
}

// ═══════════════════════════════════════════════════════════
// EMPLOYEE
// ═══════════════════════════════════════════════════════════
function Employee({ currentUser, records, justifications, onLogout }) {
  const [tab, setTab] = useState("punch");
  const myRecords = records.filter(r => r.userId === currentUser.id);
  const myJust = justifications.filter(j => j.userId === currentUser.id);
  const tabs = [{ id: "punch", icon: "clock", label: "Bater Ponto" }, { id: "history", icon: "calendar", label: "Histórico" }, { id: "just", icon: "filetext", label: "Justificativas" }];
  return h("div", { style: { minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column" } },
    h(Header, { title: "Olá, " + currentUser.name.split(" ")[0], sub: "", onLogout }),
    h("div", { style: { flex: 1, overflowY: "auto", paddingBottom: 8 } },
      tab === "punch" && h(EPunch, { currentUser, records: myRecords }),
      tab === "history" && h(EHistory, { records: myRecords }),
      tab === "just" && h(EJustifications, { currentUser, justifications: myJust })
    ),
    h(BottomNav, { tabs, active: tab, onChange: setTab })
  );
}

function EPunch({ currentUser, records }) {
  const [showCam, setShowCam] = useState(false);
  const [busy, setBusy] = useState(false);
  const today = todayKey();
  const todayRecord = records.find(r => r.date === today) || null;
  const nextType = getNextPunchType(todayRecord);
  const unack = records.find(r => r.warning && !r.warningAck);

  const dismissWarning = async () => { if (unack) await updateItem("records", unack.id, { warningAck: true }); };

  const handleCapture = async (photo) => {
    setShowCam(false); setBusy(true);
    try {
      const loc = await getLocation();
      await registerPunch(currentUser, nextType, photo, loc);
    } catch (e) { alert("Erro ao registrar ponto: " + e.message); }
    setBusy(false);
  };

  return h("div", { style: { padding: 16 } },
    showCam && h(SelfieCam, { onCapture: handleCapture, onCancel: () => setShowCam(false) }),
    unack && h("div", { style: { background: "rgba(255,61,113,0.1)", border: "1px solid rgba(255,61,113,0.3)", borderRadius: 14, padding: 14, marginBottom: 16 } },
      h("div", { style: { display: "flex", alignItems: "center", gap: 8, color: "#ff3d71", fontWeight: 700, fontSize: 13 } }, h(Icon, { name: "alert", size: 16, color: "#ff3d71" }), "Advertência por atraso"),
      h("div", { style: { color: "#fca5a5", fontSize: 12, marginTop: 4 } }, "No dia " + fmt.dateBR(unack.date) + " você chegou " + unack.lateMinutes + " min atrasado (acima da tolerância)."),
      h("button", { onClick: dismissWarning, style: { marginTop: 10, background: "#7f1d1d", border: "none", borderRadius: 8, padding: "6px 14px", color: "#fff", fontSize: 12, cursor: "pointer" } }, "Entendi")
    ),
    h(Card, { style: { padding: 20, textAlign: "center", marginBottom: 16 } },
      h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 } }, fmt.dateBR(today)),
      nextType ? h(React.Fragment, null,
        h("div", { style: { color: "#fff", fontSize: 15, marginBottom: 16 } }, "Próximo registro: ", h("b", null, PUNCH_LABEL[nextType])),
        h(Btn, { onClick: () => setShowCam(true), disabled: busy, style: { padding: "16px 32px", fontSize: 16, width: "100%" } }, busy ? "Registrando..." : "📸 Bater Ponto")
      ) : h("div", { style: { color: "#00d68f", fontWeight: 700, fontSize: 16 } }, "✓ Jornada concluída hoje")
    ),
    todayRecord && h(Card, { style: { padding: "4px 14px" } },
      h(PunchRow, { label: "Entrada", p: todayRecord.in }),
      h(PunchRow, { label: "Saída Almoço", p: todayRecord.lunchOut }),
      h(PunchRow, { label: "Volta Almoço", p: todayRecord.lunchIn }),
      h(PunchRow, { label: "Saída", p: todayRecord.out })
    )
  );
}

function EHistory({ records }) {
  return h("div", { style: { padding: 16 } },
    h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 20, marginBottom: 16 } }, "Meu Histórico"),
    records.length === 0 ? h(Card, { style: { padding: 40, textAlign: "center" } }, h("div", { style: { color: C.muted } }, "Nenhum registro ainda")) :
      h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
        records.slice().sort((a, b) => b.date.localeCompare(a.date)).map(r => h(Card, { key: r.id, style: { padding: 14 } },
          h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
            h("div", null,
              h("div", { style: { color: "#fff", fontWeight: 700 } }, fmt.dateBR(r.date)),
              h("div", { style: { color: C.muted, fontSize: 11, marginTop: 2 } }, (r.in ? fmt.timeOnly(r.in.time) : "—") + " - " + (r.out ? fmt.timeOnly(r.out.time) : "—"))
            ),
            r.warning && h("span", { style: { background: "rgba(255,61,113,0.15)", color: "#ff3d71", fontSize: 10, padding: "3px 8px", borderRadius: 20, fontWeight: 700 } }, "Advertência")
          ),
          r.workedMinutes != null && h("div", { style: { display: "flex", gap: 16, marginTop: 8 } },
            h("div", { style: { color: "#94a3b8", fontSize: 12 } }, "Trabalhado: " + minutesToHM(r.workedMinutes)),
            r.overtimeMinutes > 0 && h("div", { style: { color: "#00d68f", fontSize: 12 } }, "Extra: " + minutesToHM(r.overtimeMinutes))
          )
        ))
      )
  );
}

function EJustifications({ currentUser, justifications }) {
  const [form, setForm] = useState({ date: todayKey(), type: "Atraso", reason: "" });
  const [attachment, setAttachment] = useState(null);
  const [showCam, setShowCam] = useState(false);
  const [viewer, setViewer] = useState(null);
  const [busy, setBusy] = useState(false);
  const [fileErr, setFileErr] = useState("");
  const [sent, setSent] = useState(false);
  const fileRef = useRef(null);
  const STJ = { pending: { l: "Pendente", c: "#ffb300" }, approved: { l: "Aprovada", c: "#00d68f" }, rejected: { l: "Rejeitada", c: "#ff3d71" } };

  const onPickFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (e.target) e.target.value = "";
    if (!file) return;
    setFileErr(""); setBusy(true);
    try { const data = await downscaleImage(file, 1100, 0.55); setAttachment(data); }
    catch (err) { setFileErr(err.message || "Não foi possível usar este arquivo."); }
    setBusy(false);
  };
  const onCamCapture = (photo) => { setShowCam(false); if (photo) setAttachment(photo); };

  const send = async () => {
    if (!form.reason.trim()) return;
    setBusy(true);
    try {
      await setItem("justifications", genId(), { userId: currentUser.id, userName: currentUser.name, date: form.date, type: form.type, reason: form.reason.trim(), attachment: attachment || null, status: "pending", createdAt: new Date().toISOString() });
      setForm({ date: todayKey(), type: "Atraso", reason: "" });
      setAttachment(null); setFileErr("");
      setSent(true); setTimeout(() => setSent(false), 2500);
    } catch (e) { setFileErr("Erro ao enviar: " + (e.message || "tente novamente")); }
    setBusy(false);
  };

  return h("div", { style: { padding: 16 } },
    showCam && h(SelfieCam, { onCapture: onCamCapture, onCancel: () => setShowCam(false), facingMode: "environment", captureWidth: 1100 }),
    viewer && h(ImageViewer, { src: viewer, onClose: () => setViewer(null) }),
    h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 20, marginBottom: 16 } }, "Justificativas"),
    h(Card, { style: { padding: 16, marginBottom: 20 } },
      h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 } }, "Nova justificativa"),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
        h("input", { type: "date", value: form.date, onChange: e => setForm(p => ({ ...p, date: e.target.value })), style: { background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14, outline: "none" } }),
        h("select", { value: form.type, onChange: e => setForm(p => ({ ...p, type: e.target.value })), style: { background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14, outline: "none" } },
          h("option", { value: "Atraso" }, "Atraso"), h("option", { value: "Falta" }, "Falta"), h("option", { value: "Atestado/Declaração" }, "Atestado/Declaração"), h("option", { value: "Outro" }, "Outro")
        ),
        h("textarea", { value: form.reason, onChange: e => setForm(p => ({ ...p, reason: e.target.value })), placeholder: "Explique o motivo...", rows: 3, style: { background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14, outline: "none", resize: "vertical" } }),
        h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 1, textTransform: "uppercase" } }, "Anexar atestado / declaração"),
        h("input", { ref: fileRef, type: "file", accept: "image/*", onChange: onPickFile, style: { display: "none" } }),
        !attachment && h("div", { style: { display: "flex", gap: 8 } },
          h(Btn, { onClick: () => setShowCam(true), color: "#1e293b", disabled: busy, style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 } }, h(Icon, { name: "camera", size: 16 }), "Tirar foto"),
          h(Btn, { onClick: () => fileRef.current && fileRef.current.click(), color: "#1e293b", disabled: busy, style: { flex: 1 } }, busy ? "Processando..." : "📎 Anexar arquivo")
        ),
        attachment && h("div", { style: { display: "flex", alignItems: "center", gap: 12, background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: 10 } },
          h("img", { src: attachment, onClick: () => setViewer(attachment), style: { width: 54, height: 54, borderRadius: 8, objectFit: "cover", cursor: "pointer", flexShrink: 0 } }),
          h("div", { style: { flex: 1, color: "#94a3b8", fontSize: 12 } }, "Anexo pronto. Toque na imagem para ampliar."),
          h("button", { onClick: () => setAttachment(null), style: { background: "none", border: "none", cursor: "pointer", color: "#ff3d71" } }, h(Icon, { name: "trash", size: 17 }))
        ),
        fileErr && h("div", { style: { color: "#ff3d71", fontSize: 12 } }, fileErr),
        h(Btn, { onClick: send, disabled: !form.reason.trim() || busy }, sent ? "✓ Enviado!" : (busy ? "Aguarde..." : "Enviar Justificativa"))
      )
    ),
    h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 } }, "Minhas justificativas"),
    justifications.length === 0 ? h(Card, { style: { padding: 24, textAlign: "center" } }, h("div", { style: { color: C.muted, fontSize: 13 } }, "Nenhuma enviada ainda")) :
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
        justifications.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || "")).map(j => h(Card, { key: j.id, style: { padding: 14 } },
          h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
            h("div", null, h("div", { style: { color: "#fff", fontWeight: 700, fontSize: 13 } }, fmt.dateBR(j.date) + " • " + j.type)),
            h("span", { style: { background: (STJ[j.status] || STJ.pending).c + "22", color: (STJ[j.status] || STJ.pending).c, fontSize: 10, padding: "3px 8px", borderRadius: 20, fontWeight: 700 } }, (STJ[j.status] || STJ.pending).l)
          ),
          h("div", { style: { color: "#94a3b8", fontSize: 12, marginTop: 6 } }, j.reason),
          j.attachment && h("img", { src: j.attachment, onClick: () => setViewer(j.attachment), style: { width: 64, height: 64, borderRadius: 8, objectFit: "cover", cursor: "pointer", marginTop: 8 } })
        ))
      )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
})();
</script>

<script>
  setTimeout(function() {
    var root = document.getElementById('root');
    if (root && root.children.length === 0) {
      showErr('NADA CARREGOU depois de 6 segundos. Possíveis causas: sem internet, ou algum dos scripts (React/Firebase) foi bloqueado. Verifique a conexão e tente recarregar a página.');
    }
  }, 6000);
</script>
</body>
