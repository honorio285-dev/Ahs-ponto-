function useCollection(name) {
  const [data, setData] = useState([]);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    const unsub = fdb.collection(name).onSnapshot(snap => {

  }, []);

}

const genId = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
function downscaleImage(file, maxDim, quality) {
  maxDim = maxDim || 1000; quality = quality || 0.55;
  return new Promise(function (resolve, reject) {
    if (!file || !/^image\//.test(file.type)) { reject(new Error("Selecione uma imagem (JPG ou PNG).")); return; }
    var reader = new FileReader();
    reader.onload = function () {
      var img = new Image();
      img.onload = function () {
        var w = img.width, hh = img.height;
        if (w >= hh) { if (w > maxDim) { hh = Math.round(hh * maxDim / w); w = maxDim; } }
        else { if (hh > maxDim) { w = Math.round(w * maxDim / hh); hh = maxDim; } }
        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = hh;
        canvas.getContext("2d").drawImage(img, 0, 0, w, hh);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = function () { reject(new Error("Imagem inválida.")); };
      img.src = reader.result;
    };
    reader.onerror = function () { reject(new Error("Falha ao ler o arquivo.")); };
    reader.readAsDataURL(file);
  });
}
function getLocation(timeout) {
  timeout = timeout || 8000;
  return new Promise(function (resolve) {
    if (!navigator.geolocation) { resolve(null); return; }
    var done = false;
    function finish(loc) { if (!done) { done = true; resolve(loc); } }
    var t = setTimeout(function () { finish(null); }, timeout);
    navigator.geolocation.getCurrentPosition(
      function (pos) { clearTimeout(t); finish({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
      function () {

async function registerPunch(user, type, photo, loc) {

  let data = snap.exists ? snap.data() : { userId: user.id, userName: user.name, date: dateStr };
  data[type] = punchData;

  // Atraso conta na ENTRADA e no RETORNO DO ALMOÇO
  if (type === "in" || type === "lunchIn") {
    const sched = parseHM(schedFor(user, type));
    const actual = minutesOfDay(now);
    const lateMinutes = Math.max(0, actual - sched);
    const isLate = lateMinutes > tol;
    if (type === "in") {
      data.lateMinutes = lateMinutes;
      data.warning = isLate;
      data.warningAck = false;
    } else {
      data.lunchLateMinutes = lateMinutes;
      data.lunchWarning = isLate;
    }
    if (isLate) {
      const label = type === "in" ? "Entrada" : "Retorno do almoço";
      try { await issueLateWarning(user, label, schedFor(user, type), now, lateMinutes, tol, dateStr); } catch (e) {}
    }
  }

  if (type === "out" && data.in && data.lunchOut && data.lunchIn) {
    const worked = minutesBetween(data.in.time, data.lunchOut.time) + minutesBetween(data.lunchIn.time, data.out.time);
    const expected = (parseHM(user.scheduleEnd) - parseHM(user.scheduleStart)) - (user.lunchMinutes != null ? user.lunchMinutes : 60);
    data.workedMinutes = worked;
    data.expectedMinutes = expected;
    data.overtimeMinutes = Math.max(0, worked - expected);
  }
  await setItem("records", id, data);
  return data;
}

function exportCSV(records, employees) {
  employees = employees || [];
  const empById = {};
  employees.forEach(e => { empById[e.id] = e; });
  const esc = (v) => '"' + String(v == null ? "" : v).replace(/"/g, '""') + '"';
  // agrupar registros por colaborador
  const groups = {};
  records.forEach(r => {
    const key = r.userId || r.userName || "—";
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  const keys = Object.keys(groups).sort((a, b) => {
    const na = (empById[a] && empById[a].name) || (groups[a][0] && groups[a][0].userName) || "";
    const nb = (empById[b] && empById[b].name) || (groups[b][0] && groups[b][0].userName) || "";
    return na.localeCompare(nb);
  });
  const lines = [];
  keys.forEach(key => {
    const recs = groups[key].slice().sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    const emp = empById[key];
    const nome = (emp && emp.name) || (recs[0] && recs[0].userName) || "—";
    const posto = (emp && emp.posto) ? emp.posto : "—";
    lines.push(esc("Colaborador: " + nome));
    lines.push(esc("Posto: " + posto));
    lines.push("");
    lines.push(["Dia", "Entrada", "Saída Almoço", "Retorno Almoço", "Saída", "Horas Extras"].map(esc).join(","));
    recs.forEach(r => {
      lines.push([
        fmt.dateBR(r.date),
        r.in ? fmt.timeOnly(r.in.time) : "—",
        r.lunchOut ? fmt.timeOnly(r.lunchOut.time) : "—",
        r.lunchIn ? fmt.timeOnly(r.lunchIn.time) : "—",
        r.out ? fmt.timeOnly(r.out.time) : "—",
        r.overtimeMinutes ? minutesToHM(r.overtimeMinutes) : "—"
      ].map(esc).join(","));
    });
    lines.push(""); lines.push("");
  });
  const csv = lines.join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "relatorio_ponto_" + todayKey() + ".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  const empById = {};

    const nb = (empById[b] && empById[b].name) || (groups[b][0] && groups[b][0].userName) || "";
    return na.localeCompare(nb);
  });

  const aoa = [];        // matriz de células
  const merges = [];     // mesclagens
  const headerRows = []; // linhas que são cabeçalho de tabela (p/ estilo)
  const nameRows = [];   // linhas de nome do colaborador

  keys.forEach((key, idx) => {
    const recs = groups[key].slice().sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    const emp = empById[key];
    const nome = (emp && emp.name) ? emp.name.trim() : ((recs[0] && recs[0].userName) || "—");
    const posto = (emp && emp.posto) ? String(emp.posto).trim() : "—";

    nameRows.push(aoa.length);
    aoa.push(["Colaborador: " + nome, "", "", "", "", ""]);
    merges.push({ s: { r: aoa.length - 1, c: 0 }, e: { r: aoa.length - 1, c: 5 } });
    aoa.push(["Posto: " + posto, "", "", "", "", ""]);
    merges.push({ s: { r: aoa.length - 1, c: 0 }, e: { r: aoa.length - 1, c: 5 } });

    headerRows.push(aoa.length);
    aoa.push(["Dia", "Entrada", "Saída Almoço", "Retorno Almoço", "Saída", "Horas Extras"]);

      ]);
    });
    aoa.push(["", "", "", "", "", ""]); // linha em branco entre pessoas
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws["!merges"] = merges;
  ws["!cols"] = [{ wch: 14 }, { wch: 10 }, { wch: 14 }, { wch: 16 }, { wch: 10 }, { wch: 14 }];

  // estilos
  const headFill = { patternType: "solid", fgColor: { rgb: "1E6FFF" } };
  const headFont = { bold: true, color: { rgb: "FFFFFF" }, sz: 11 };
  const nameFont = { bold: true, color: { rgb: "0F172A" }, sz: 12 };
  const center = { horizontal: "center" };
  const border1 = { style: "thin", color: { rgb: "CBD5E1" } };
  const cellBorder = { top: border1, bottom: border1, left: border1, right: border1 };

  const range = XLSX.utils.decode_range(ws["!ref"]);
  for (let R = range.s.r; R <= range.e.r; R++) {
    for (let Ci = range.s.c; Ci <= range.e.c; Ci++) {
      const ref = XLSX.utils.encode_cell({ r: R, c: Ci });
      if (!ws[ref]) continue;
      if (headerRows.indexOf(R) !== -1) {
        ws[ref].s = { fill: headFill, font: headFont, alignment: center, border: cellBorder };
      } else if (nameRows.indexOf(R) !== -1 || nameRows.indexOf(R - 1) !== -1) {
        ws[ref].s = { font: nameFont };
      } else {
        ws[ref].s = { alignment: center, border: cellBorder };
      }
    }
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Relatório de Ponto");
  XLSX.writeFile(wb, "relatorio_ponto_" + todayKey() + ".xlsx");
}

// CÂMERA DE SELFIE
// ═══════════════════════════════════════════════════════════
function SelfieCam({ onCapture, onCancel, facingMode, captureWidth }) {
  facingMode = facingMode || "user";
  captureWidth = captureWidth || 240;
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const canvasRef = useRef(null);
  const [photo, setPhoto] = useState(null);
  const [err, setErr] = useState("");
  const [starting, setStarting] = useState(true);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode, width: { ideal: facingMode === "user" ? 480 : 1280 } } });
        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
        setStarting(false);
      } catch (e) { setErr("Câmera indisponível (" + (e.message || "erro") + ")"); setStarting(false); }
    })();
    return () => { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
  }, []);

  const capture = () => {
    const v = videoRef.current; if (!v || !v.videoWidth) return;
    const w = captureWidth, hh = Math.round(w * (v.videoHeight / v.videoWidth));
    const canvas = canvasRef.current;
    canvas.width = w; canvas.height = hh;
    canvas.getContext("2d").drawImage(v, 0, 0, w, hh);
    setPhoto(canvas.toDataURL("image/jpeg", 0.6));
  };

  const confirm = () => { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); onCapture(photo); };

  return h("div", { style: { position: "fixed", inset: 0, background: "#000", zIndex: 200, display: "flex", flexDirection: "column" } },
    h("div", { style: { flex: 1, position: "relative", display: "flex", alignItems: "center", justifyContent: "center" } },
      !photo && h("video", { ref: videoRef, autoPlay: true, playsInline: true, muted: true, style: { width: "100%", height: "100%", objectFit: "cover", display: starting ? "none" : "block" } }),
      photo && h("img", { src: photo, style: { width: "100%", height: "100%", objectFit: "cover" } }),
      starting && !err && h("div", { style: { color: "#fff", textAlign: "center" } }, "Abrindo câmera..."),
      err && h("div", { style: { color: "#fca5a5", textAlign: "center", padding: 20 } }, err)
    ),
    h("canvas", { ref: canvasRef, style: { display: "none" } }),
    h("div", { style: { padding: 16, display: "flex", gap: 12, justifyContent: "center", background: "#000", flexWrap: "wrap" } },
      h(Btn, { onClick: onCancel, color: "#1e293b" }, "Cancelar"),
      err && h(Btn, { onClick: () => onCapture(null), color: "#475569" }, "Continuar sem foto"),
      !photo && !err && h(Btn, { onClick: capture, disabled: starting }, "📸 Capturar"),
      photo && h(Btn, { onClick: () => setPhoto(null), color: "#475569" }, "Repetir"),
      photo && h(Btn, { onClick: confirm, color: "#00d68f", style: { color: "#04150d" } }, "Confirmar")
    )
  );
}

function SignaturePad({ onConfirm, onCancel }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);
  const drawn = useRef(false);
  const [empty, setEmpty] = useState(true);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.round(rect.width * ratio);
    canvas.height = Math.round(rect.height * ratio);
    const ctx = canvas.getContext("2d");
    ctx.scale(ratio, ratio);
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, rect.width, rect.height);
    ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = "#0f172a";
  }, []);

  const pos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const t = e.touches && e.touches[0] ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  };
  const start = (e) => { drawing.current = true; last.current = pos(e); };
  const move = (e) => {
    if (!drawing.current) return;
    const ctx = canvasRef.current.getContext("2d");
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.current.x, last.current.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    last.current = p; drawn.current = true; if (empty) setEmpty(false);
  };
  const end = () => { drawing.current = false; };
  const clear = () => {
    const canvas = canvasRef.current; const ctx = canvas.getContext("2d");
    const rect = canvas.getBoundingClientRect();
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, rect.width, rect.height);
    drawn.current = false; setEmpty(true);
  };
  const confirm = () => { if (!drawn.current) return; onConfirm(canvasRef.current.toDataURL("image/png")); };

  return h("div", { style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 400, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20 } },
    h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 16, marginBottom: 6 } }, "Assine no quadro abaixo"),
    h("div", { style: { color: "#94a3b8", fontSize: 12, marginBottom: 14, textAlign: "center" } }, "Use o dedo para assinar e confirme o recebimento."),
    h("canvas", { ref: canvasRef, onMouseDown: start, onMouseMove: move, onMouseUp: end, onMouseLeave: end, onTouchStart: start, onTouchMove: move, onTouchEnd: end, style: { width: "100%", maxWidth: 420, height: 200, background: "#fff", borderRadius: 12, touchAction: "none", cursor: "crosshair" } }),
    h("div", { style: { display: "flex", gap: 10, marginTop: 16, flexWrap: "wrap", justifyContent: "center" } },
      onCancel && h(Btn, { onClick: onCancel, color: "#1e293b" }, "Cancelar"),
      h(Btn, { onClick: clear, color: "#475569" }, "Limpar"),
      h(Btn, { onClick: confirm, color: empty ? "#1e293b" : "#00d68f", disabled: empty, style: { color: empty ? "#475569" : "#04150d" } }, "Confirmar assinatura")
    )
  );
}

function Employee({ currentUser, records, justifications, messages, tickets, onLogout }) {
  const [tab, setTab] = useState("punch");
  const myRecords = records.filter(r => r.userId === currentUser.id);
  const myJust = justifications.filter(j => j.userId === currentUser.id);
  const myMessages = messages.filter(m => m.userId === currentUser.id);
  const myTickets = tickets.filter(t => t.userId === currentUser.id);
  const pending = myMessages
    .filter(m => m.requireSignature && !(m.ack && m.ack.signed))
    .sort((a, b) => (a.createdAt || "").localeCompare(b.createdAt || ""));
  const unreadCount = pending.length;

  // Bloqueio: enquanto houver mensagem/holerite pendente de assinatura, força assinar
  if (pending.length > 0) return h(SignBlocker, { message: pending[0], currentUser, onLogout });

  const tabs = [
    { id: "punch", icon: "clock", label: "Bater Ponto" },
    { id: "history", icon: "calendar", label: "Histórico" },
    { id: "messages", icon: "mail", label: "Mensagens" + (unreadCount ? " (" + unreadCount + ")" : "") },
    { id: "just", icon: "filetext", label: "Justific." }
  ];
  return h("div", { style: { minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column" } },
    h(Header, { title: "Olá, " + currentUser.name.split(" ")[0], sub: "", onLogout }),
    h("div", { style: { flex: 1, overflowY: "auto", paddingBottom: 8 } },
      tab === "punch" && h(EPunch, { currentUser, records: myRecords }),
      tab === "history" && h(EHistory, { records: myRecords }),
      tab === "messages" && h(EMessages, { currentUser, messages: myMessages, tickets: myTickets }),
      tab === "just" && h(EJustifications, { currentUser, justifications: myJust })
    ),
    h(BottomNav, { tabs, active: tab, onChange: setTab })
  );
}

function SignBlocker({ message, currentUser, onLogout }) {
  const [showPad, setShowPad] = useState(false);
  const [viewer, setViewer] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const sign = async (sigDataUrl) => {
    setShowPad(false); setBusy(true); setErr("");
    try {
      await updateItem("messages", message.id, { ack: { signed: true, signedAt: new Date().toISOString(), signedBy: currentUser.name, signature: sigDataUrl } });
    } catch (e) { setErr("Erro ao registrar assinatura. Tente novamente."); setBusy(false); }
  };
  return h("div", { style: { minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column" } },
    showPad && h(SignaturePad, { onConfirm: sign, onCancel: () => setShowPad(false) }),
    viewer && h(ImageViewer, { src: viewer, onClose: () => setViewer(null) }),
    h(Header, { title: "Confirmação de recebimento", sub: "", onLogout }),
    h("div", { style: { flex: 1, overflowY: "auto", padding: 16 } },
      h("div", { style: { background: "rgba(255,179,0,0.1)", border: "1px solid rgba(255,179,0,0.3)", borderRadius: 14, padding: 14, marginBottom: 16, display: "flex", alignItems: "center", gap: 8 } },
        h(Icon, { name: "alert", size: 18, color: "#ffb300" }),
        h("div", { style: { color: "#ffb300", fontSize: 13, fontWeight: 700 } }, "Você precisa assinar o recebimento para continuar.")
      ),
      h(Card, { style: { padding: 18 } },
        h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 17 } }, msgPrefix(message.type) + (message.title || "")),
        h("div", { style: { color: C.muted, fontSize: 12, marginTop: 4 } }, fmt.dateTimeBR(message.createdAt)),
        message.body && h("div", { style: { color: "#cbd5e1", fontSize: 14, marginTop: 12, whiteSpace: "pre-wrap" } }, message.body),
        message.attachment && h("img", { src: message.attachment, onClick: () => setViewer(message.attachment), style: { width: "100%", maxWidth: 320, borderRadius: 10, marginTop: 14, cursor: "pointer" } })
      ),
      err && h("div", { style: { color: "#ff3d71", fontSize: 13, marginTop: 12 } }, err),
      h(Btn, { onClick: () => setShowPad(true), disabled: busy, style: { width: "100%", marginTop: 16, padding: 16, fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 } }, h(Icon, { name: "pen", size: 18 }), busy ? "Registrando..." : "Assinar recebimento")
    )
  );
}

function EMessages({ currentUser, messages, tickets }) {
  const [viewer, setViewer] = useState(null);
  const [category, setCategory] = useState("Pagamento");
  const [body, setBody] = useState("");
  const [attachment, setAttachment] = useState(null);
  const [showCam, setShowCam] = useState(false);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [sent, setSent] = useState(false);
  const fileRef = useRef(null);
  const CAT = { Pagamento: "#ffb300", "Benefício": "#a78bfa", Outro: "#60a5fa" };

  const onPickFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (e.target) e.target.value = "";
    if (!file) return;
    setErr(""); setBusy(true);
    try { setAttachment(await downscaleImage(file, 1200, 0.55)); }
    catch (er) { setErr(er.message || "Não foi possível usar este arquivo."); }
    setBusy(false);
  };
  const send = async () => {
    if (!body.trim()) { setErr("Escreva sua mensagem."); return; }
    setBusy(true);
    try {
      await setItem("tickets", genId(), { userId: currentUser.id, userName: currentUser.name, category, body: body.trim(), attachment: attachment || null, status: "open", reply: null, repliedAt: null, createdAt: new Date().toISOString() });
      setBody(""); setAttachment(null); setErr("");
      setSent(true); setTimeout(() => setSent(false), 2500);
    } catch (e) { setErr("Erro ao enviar: " + (e.message || "tente novamente")); }
    setBusy(false);
  };
  const ipt = { background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14, outline: "none", width: "100%", boxSizing: "border-box" };

  return h("div", { style: { padding: 16 } },
    showCam && h(SelfieCam, { onCapture: (p) => { setShowCam(false); if (p) setAttachment(p); }, onCancel: () => setShowCam(false), facingMode: "environment", captureWidth: 1200 }),
    viewer && h(ImageViewer, { src: viewer, onClose: () => setViewer(null) }),

    h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 20, marginBottom: 16 } }, "Falar com o administrador"),
    h(Card, { style: { padding: 16, marginBottom: 20 } },
      h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 } }, "Nova solicitação"),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
        h("select", { value: category, onChange: e => setCategory(e.target.value), style: ipt },
          h("option", { value: "Pagamento" }, "Pagamento"),
          h("option", { value: "Benefício" }, "Benefício"),
          h("option", { value: "Outro" }, "Outro")
        ),
        h("textarea", { value: body, onChange: e => setBody(e.target.value), placeholder: "Escreva sua solicitação ou reclamação...", rows: 3, style: { ...ipt, resize: "vertical" } }),
        h("input", { ref: fileRef, type: "file", accept: "image/*", onChange: onPickFile, style: { display: "none" } }),
        attachment ? h("div", { style: { display: "flex", alignItems: "center", gap: 12, background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: 10 } },
          h("img", { src: attachment, onClick: () => setViewer(attachment), style: { width: 50, height: 50, borderRadius: 8, objectFit: "cover", cursor: "pointer", flexShrink: 0 } }),
          h("div", { style: { flex: 1, color: "#94a3b8", fontSize: 12 } }, "Anexo pronto."),
          h("button", { onClick: () => setAttachment(null), style: { background: "none", border: "none", cursor: "pointer", color: "#ff3d71" } }, h(Icon, { name: "trash", size: 16 }))
        ) : h("div", { style: { display: "flex", gap: 8 } },
          h(Btn, { onClick: () => setShowCam(true), color: "#1e293b", disabled: busy, style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 } }, h(Icon, { name: "camera", size: 16 }), "Foto"),
          h(Btn, { onClick: () => fileRef.current && fileRef.current.click(), color: "#1e293b", disabled: busy, style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 } }, h(Icon, { name: "paperclip", size: 15 }), busy ? "..." : "Anexar")
        ),
        err && h("div", { style: { color: "#ff3d71", fontSize: 12 } }, err),
        h(Btn, { onClick: send, disabled: busy, style: { display: "flex", alignItems: "center", justifyContent: "center", gap: 6 } }, h(Icon, { name: "send", size: 15 }), sent ? "✓ Enviado!" : (busy ? "Enviando..." : "Enviar ao administrador"))
      )
    ),

    h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 } }, "Minhas solicitações"),
    tickets.length === 0 ? h(Card, { style: { padding: 20, textAlign: "center", marginBottom: 20 } }, h("div", { style: { color: C.muted, fontSize: 13 } }, "Nenhuma solicitação enviada")) :
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 } },
        tickets.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || "")).map(t => h(Card, { key: t.id, style: { padding: 14 } },
          h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 } },
            h("span", { style: { background: (CAT[t.category] || "#60a5fa") + "22", color: CAT[t.category] || "#60a5fa", fontSize: 10, padding: "3px 8px", borderRadius: 20, fontWeight: 700 } }, t.category || "Outro"),
            h("span", { style: { color: t.status === "answered" ? "#00d68f" : "#ffb300", fontSize: 11, fontWeight: 700 } }, t.status === "answered" ? "Respondida" : "Aguardando")
          ),
          h("div", { style: { color: "#cbd5e1", fontSize: 13, marginTop: 8, whiteSpace: "pre-wrap" } }, t.body),
          t.attachment && h("img", { src: t.attachment, onClick: () => setViewer(t.attachment), style: { width: 64, height: 64, borderRadius: 8, objectFit: "cover", cursor: "pointer", marginTop: 8 } }),
          h("div", { style: { color: C.muted, fontSize: 10, marginTop: 6 } }, fmt.dateTimeBR(t.createdAt)),
          t.reply && h("div", { style: { marginTop: 10, background: "rgba(30,111,255,0.08)", border: "1px solid rgba(30,111,255,0.25)", borderRadius: 10, padding: 10 } },
            h("div", { style: { color: "#60a5fa", fontSize: 10, letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 } }, "Resposta do administrador"),
            h("div", { style: { color: "#cbd5e1", fontSize: 13, whiteSpace: "pre-wrap" } }, t.reply)
          )
        ))
      ),

    h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 } }, "Recebidas do administrador"),
    messages.length === 0 ? h(Card, { style: { padding: 24, textAlign: "center" } }, h("div", { style: { color: C.muted, fontSize: 13 } }, "Nenhuma mensagem")) :
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
        messages.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || "")).map(m => {
          const signed = m.ack && m.ack.signed;
          return h(Card, { key: m.id, style: { padding: 14 } },
            h("div", { style: { color: "#fff", fontWeight: 700, fontSize: 14 } }, msgPrefix(m.type) + (m.title || "")),
            h("div", { style: { color: C.muted, fontSize: 11, marginTop: 2 } }, fmt.dateTimeBR(m.createdAt)),
            m.body && h("div", { style: { color: "#cbd5e1", fontSize: 13, marginTop: 8, whiteSpace: "pre-wrap" } }, m.body),
            m.attachment && h("img", { src: m.attachment, onClick: () => setViewer(m.attachment), style: { width: 80, height: 80, borderRadius: 8, objectFit: "cover", cursor: "pointer", marginTop: 8 } }),
            m.requireSignature && h("div", { style: { marginTop: 10 } },
              signed ? h("span", { style: { background: "#00d68f22", color: "#00d68f", fontSize: 11, padding: "4px 10px", borderRadius: 20, fontWeight: 700 } }, "✓ Recebimento assinado") :
                h("span", { style: { background: "#ffb30022", color: "#ffb300", fontSize: 11, padding: "4px 10px", borderRadius: 20, fontWeight: 700 } }, "Assinatura pendente")
            )
          );
        })
      )
  );
}

function EPunch({ currentUser, records }) {
  const [showCam, setShowCam] = useState(false);
  const [busy, setBusy] = useState(false);
  const today = todayKey();
  const todayRecord = records.find(r => r.date === today) || null;
  const nextType = getNextPunchType(todayRecord);
  const unack = records.find(r => r.warning && !r.warningAck);

  const dismissWarning = async () => { if (unack) await updateItem("records", unack.id, { warningAck: true }); };

  const handleCapture = async (photo) => {
    setShowCam(false); setBusy(true);
    try {
      const loc = await getLocation();
      await registerPunch(currentUser, nextType, photo, loc);
    } catch (e) { alert("Erro ao registrar ponto: " + e.message); }
    setBusy(false);
  };

  return h("div", { style: { padding: 16 } },
    showCam && h(SelfieCam, { onCapture: handleCapture, onCancel: () => setShowCam(false) }),
    unack && h("div", { style: { background: "rgba(255,61,113,0.1)", border: "1px solid rgba(255,61,113,0.3)", borderRadius: 14, padding: 14, marginBottom: 16 } },
      h("div", { style: { display: "flex", alignItems: "center", gap: 8, color: "#ff3d71", fontWeight: 700, fontSize: 13 } }, h(Icon, { name: "alert", size: 16, color: "#ff3d71" }), "Advertência por atraso"),
      h("div", { style: { color: "#fca5a5", fontSize: 12, marginTop: 4 } }, "No dia " + fmt.dateBR(unack.date) + " você chegou " + unack.lateMinutes + " min atrasado (acima da tolerância)."),
      h("button", { onClick: dismissWarning, style: { marginTop: 10, background: "#7f1d1d", border: "none", borderRadius: 8, padding: "6px 14px", color: "#fff", fontSize: 12, cursor: "pointer" } }, "Entendi")
    ),
    h(Card, { style: { padding: 20, textAlign: "center", marginBottom: 16 } },
      h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 } }, fmt.dateBR(today)),
      nextType ? h(React.Fragment, null,
        h("div", { style: { color: "#fff", fontSize: 15, marginBottom: 4 } }, "Próximo registro: ", h("b", null, PUNCH_LABEL[nextType])),
        h("div", { style: { color: C.muted, fontSize: 12, marginBottom: 16 } }, "Horário previsto: " + schedFor(currentUser, nextType)),
        h(Btn, { onClick: () => setShowCam(true), disabled: busy, style: { padding: "16px 32px", fontSize: 16, width: "100%" } }, busy ? "Registrando..." : "📸 Bater Ponto")
      ) : h("div", { style: { color: "#00d68f", fontWeight: 700, fontSize: 16 } }, "✓ Jornada concluída hoje")
    ),
    todayRecord && h(Card, { style: { padding: "4px 14px" } },
      h(PunchRow, { label: "Entrada", p: todayRecord.in }),
      h(PunchRow, { label: "Saída Almoço", p: todayRecord.lunchOut }),
      h(PunchRow, { label: "Volta Almoço", p: todayRecord.lunchIn }),
      h(PunchRow, { label: "Saída", p: todayRecord.out })
    )
  );
}

function EHistory({ records }) {
  return h("div", { style: { padding: 16 } },
    h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 20, marginBottom: 16 } }, "Meu Histórico"),
    records.length === 0 ? h(Card, { style: { padding: 40, textAlign: "center" } }, h("div", { style: { color: C.muted } }, "Nenhum registro ainda")) :
      h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
        records.slice().sort((a, b) => b.date.localeCompare(a.date)).map(r => h(Card, { key: r.id, style: { padding: 14 } },
          h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
            h("div", null,
              h("div", { style: { color: "#fff", fontWeight: 700 } }, fmt.dateBR(r.date)),
              h("div", { style: { color: C.muted, fontSize: 11, marginTop: 2 } }, (r.in ? fmt.timeOnly(r.in.time) : "—") + " - " + (r.out ? fmt.timeOnly(r.out.time) : "—"))
            ),
            r.warning && h("span", { style: { background: "rgba(255,61,113,0.15)", color: "#ff3d71", fontSize: 10, padding: "3px 8px", borderRadius: 20, fontWeight: 700 } }, "Advertência")
          ),
          r.workedMinutes != null && h("div", { style: { display: "flex", gap: 16, marginTop: 8 } },
            h("div", { style: { color: "#94a3b8", fontSize: 12 } }, "Trabalhado: " + minutesToHM(r.workedMinutes)),
            r.overtimeMinutes > 0 && h("div", { style: { color: "#00d68f", fontSize: 12 } }, "Extra: " + minutesToHM(r.overtimeMinutes))
          )
        ))
      )
  );
}

function EJustifications({ currentUser, justifications }) {
  const [form, setForm] = useState({ date: todayKey(), type: "Atraso", reason: "" });
  const [attachment, setAttachment] = useState(null);
  const [showCam, setShowCam] = useState(false);
  const [viewer, setViewer] = useState(null);
  const [busy, setBusy] = useState(false);
  const [fileErr, setFileErr] = useState("");
  const [sent, setSent] = useState(false);
  const fileRef = useRef(null);
  const STJ = { pending: { l: "Pendente", c: "#ffb300" }, approved: { l: "Aprovada", c: "#00d68f" }, rejected: { l: "Rejeitada", c: "#ff3d71" } };

  const onPickFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (e.target) e.target.value = "";
    if (!file) return;
    setFileErr(""); setBusy(true);
    try { const data = await downscaleImage(file, 1100, 0.55); setAttachment(data); }
    catch (err) { setFileErr(err.message || "Não foi possível usar este arquivo."); }
    setBusy(false);
  };
  const onCamCapture = (photo) => { setShowCam(false); if (photo) setAttachment(photo); };

  const send = async () => {
    if (!form.reason.trim()) return;
    setBusy(true);
    try {
      await setItem("justifications", genId(), { userId: currentUser.id, userName: currentUser.name, date: form.date, type: form.type, reason: form.reason.trim(), attachment: attachment || null, status: "pending", createdAt: new Date().toISOString() });
      setForm({ date: todayKey(), type: "Atraso", reason: "" });
      setAttachment(null); setFileErr("");
      setSent(true); setTimeout(() => setSent(false), 2500);
    } catch (e) { setFileErr("Erro ao enviar: " + (e.message || "tente novamente")); }
    setBusy(false);
  };

  return h("div", { style: { padding: 16 } },
    showCam && h(SelfieCam, { onCapture: onCamCapture, onCancel: () => setShowCam(false), facingMode: "environment", captureWidth: 1100 }),
    viewer && h(ImageViewer, { src: viewer, onClose: () => setViewer(null) }),
    h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 20, marginBottom: 16 } }, "Justificativas"),
    h(Card, { style: { padding: 16, marginBottom: 20 } },
      h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 } }, "Nova justificativa"),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
        h("input", { type: "date", value: form.date, onChange: e => setForm(p => ({ ...p, date: e.target.value })), style: { background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14, outline: "none" } }),
        h("select", { value: form.type, onChange: e => setForm(p => ({ ...p, type: e.target.value })), style: { background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14, outline: "none" } },
          h("option", { value: "Atraso" }, "Atraso"), h("option", { value: "Falta" }, "Falta"), h("option", { value: "Atestado/Declaração" }, "Atestado/Declaração"), h("option", { value: "Outro" }, "Outro")
        ),
        h("textarea", { value: form.reason, onChange: e => setForm(p => ({ ...p, reason: e.target.value })), placeholder: "Explique o motivo...", rows: 3, style: { background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14, outline: "none", resize: "vertical" } }),
        h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 1, textTransform: "uppercase" } }, "Anexar atestado / declaração"),
        h("input", { ref: fileRef, type: "file", accept: "image/*", onChange: onPickFile, style: { display: "none" } }),
        !attachment && h("div", { style: { display: "flex", gap: 8 } },
          h(Btn, { onClick: () => setShowCam(true), color: "#1e293b", disabled: busy, style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 } }, h(Icon, { name: "camera", size: 16 }), "Tirar foto"),
          h(Btn, { onClick: () => fileRef.current && fileRef.current.click(), color: "#1e293b", disabled: busy, style: { flex: 1 } }, busy ? "Processando..." : "📎 Anexar arquivo")
        ),
        attachment && h("div", { style: { display: "flex", alignItems: "center", gap: 12, background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: 10 } },
          h("img", { src: attachment, onClick: () => setViewer(attachment), style: { width: 54, height: 54, borderRadius: 8, objectFit: "cover", cursor: "pointer", flexShrink: 0 } }),
          h("div", { style: { flex: 1, color: "#94a3b8", fontSize: 12 } }, "Anexo pronto. Toque na imagem para ampliar."),
          h("button", { onClick: () => setAttachment(null), style: { background: "none", border: "none", cursor: "pointer", color: "#ff3d71" } }, h(Icon, { name: "trash", size: 17 }))
        ),
        fileErr && h("div", { style: { color: "#ff3d71", fontSize: 12 } }, fileErr),
        h(Btn, { onClick: send, disabled: !form.reason.trim() || busy }, sent ? "✓ Enviado!" : (busy ? "Aguarde..." : "Enviar Justificativa"))
      )
    ),
    h("div", { style: { color: C.muted, fontSize: 11, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 } }, "Minhas justificativas"),
    justifications.length === 0 ? h(Card, { style: { padding: 24, textAlign: "center" } }, h("div", { style: { color: C.muted, fontSize: 13 } }, "Nenhuma enviada ainda")) :
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
        justifications.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || "")).map(j => h(Card, { key: j.id, style: { padding: 14 } },
          h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
            h("div", null, h("div", { style: { color: "#fff", fontWeight: 700, fontSize: 13 } }, fmt.dateBR(j.date) + " • " + j.type)),
            h("span", { style: { background: (STJ[j.status] || STJ.pending).c + "22", color: (STJ[j.status] || STJ.pending).c, fontSize: 10, padding: "3px 8px", borderRadius: 20, fontWeight: 700 } }, (STJ[j.status] || STJ.pending).l)
          ),
          h("div", { style: { color: "#94a3b8", fontSize: 12, marginTop: 6 } }, j.reason),
          j.attachment && h("img", { src: j.attachment, onClick: () => setViewer(j.attachment), style: { width: 64, height: 64, borderRadius: 8, objectFit: "cover", cursor: "pointer", marginTop: 8 } })
        ))
      )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
})();
</script>

<script>
  setTimeout(function() {
    var root = document.getElementById('root');
    if (root && root.children.length === 0) {
      showErr('NADA CARREGOU depois de 6 segundos. Possíveis causas: sem internet, ou algum dos scripts (React/Firebase) foi bloqueado. Verifique a conexão e tente recarregar a página.');
    }
  }, 6000);
</script>

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function (e) {
        console.log("SW não registrado:", e);
      });
    });
  }
</script>
</body>
